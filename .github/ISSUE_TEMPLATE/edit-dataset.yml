name: Edit dataset
description: Edit an existing dataset in an existing catalog
title: "[Edit Dataset] "
labels: ["catalog-edit-dataset", "catalog-intake"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form to edit an existing dataset in a catalog.

        Fill in:
        - the exact Catalog ID
        - the exact Dataset identifier
        - at least one field to update

        If linking concepts, policies, or metrics, use existing IDs (comma-separated).

        For distributions, use one block per distribution in this format:

        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Leave a blank line between distributions.

        Allowed format values:
        - csv
        - text
        - txt
        - xlsx
        - xls
        - json
        - xml
        - ttl
        - rdf
        - parquet
        - zip
        - api

  - type: input
    id: catalog_id_existing
    attributes:
      label: Catalog ID (existing)
      description: "Required. Use the exact Catalog ID of the existing catalog."
      placeholder: "A-SF0JMV"
    validations:
      required: true

  - type: input
    id: dataset_identifier
    attributes:
      label: Dataset identifier
      description: "Required. Use the exact dataset identifier."
      placeholder: "sdcdc:A-SF0JMV-test-2H4KL0"
    validations:
      required: true

  - type: input
    id: dataset_title
    attributes:
      label: Dataset title (optional)
      description: "Optional. New dataset title."
      placeholder: "Updated voltage measurements"
    validations:
      required: false

  - type: textarea
    id: dataset_description
    attributes:
      label: Dataset description (optional)
      description: "Optional. Updated dataset description."
      placeholder: "Updated description."
    validations:
      required: false

  - type: input
    id: dataset_use_case
    attributes:
      label: Dataset use case (optional)
      description: "Optional. Must match one of the allowed catalog use cases."
      placeholder: "a-a"
    validations:
      required: false

  - type: input
    id: location
    attributes:
      label: Geographical Location (high-level) (optional)
      description: "Optional. Updated high-level geographic location."
      placeholder: "Dublin, Ireland"
    validations:
      required: false

  - type: input
    id: concept_ids
    attributes:
      label: Concept IDs (optional, comma-separated)
      description: "Optional. Replace with existing concept IDs, comma-separated."
      placeholder: "sdcdc:concept-voltage-2H4KL0, sdcdc:concept-harmonics-7QX1P9"
    validations:
      required: false

  - type: input
    id: policy_ids
    attributes:
      label: Policy IDs (optional, comma-separated)
      description: "Optional. Replace with existing policy IDs, comma-separated."
      placeholder: "sdcdc:policy-open-information-policy-7B9QX2"
    validations:
      required: false

  - type: input
    id: metric_ids
    attributes:
      label: Metric IDs (optional, comma-separated)
      description: "Optional. Replace with existing metric IDs, comma-separated."
      placeholder: "sdcdc:metric-voltage-quality-5M1ZP8"
    validations:
      required: false

  - type: textarea
    id: distributions
    attributes:
      label: Distributions (optional)
      description: |
        Optional. Replace the distributions with one block per distribution.

        Required fields per block:
        - Format
        - Access URL
        - Issued

        Format:
        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11
      placeholder: |
        Format: csv
        Access URL: https://example.com/data.csv
        Issued: 2026-06-11

        Format: xlsx
        Access URL: https://example.com/data.xlsx
        Issued: 2026-06-12
    validations:
      required: false
