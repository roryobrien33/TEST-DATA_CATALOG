name: Add dataset to a data catalog
description: Create a new catalog (define allowed use cases) or add a dataset to an existing catalog by Catalog ID
title: "[Catalog intake] "
labels: ["catalog-intake"]

body:
  - type: dropdown
    id: catalog_action
    attributes:
      label: Catalog action
      description: "Choose whether you are creating a new catalog or updating an existing one."
      options:
        - Create new catalog
        - Update existing catalog
    validations:
      required: true

  - type: markdown
    attributes:
      value: "If creating a new catalog: fill Catalog name, title, description, and Allowed use cases. If updating: fill Catalog ID (existing)."

  - type: input
    id: catalog_id_existing
    attributes:
      label: Catalog ID (existing)
      description: "Required for 'Update existing catalog'. Example: EPRI-EUROPE-GERMAN-NODE-DATASETS-VOLUME-1-478N78"
      placeholder: "(ORGANISATION)-(PROJECT-NAME)-(DATASET-ID)-######"
    validations:
      required: false

  - type: input
    id: catalog_name
    attributes:
      label: Catalog name
      description: "Required for 'Create new catalog'. You can type anything; the workflow will generate a unique ID."
      placeholder: "(ORGANISATION)-(PROJECT-NAME)-(DATASET-ID)"
    validations:
      required: false

  - type: input
    id: catalog_title
    attributes:
      label: Catalog title (required if creating a new catalog)
      description: "Only required when creating a new catalog."
      placeholder: "(ORGANISATION)-(PROJECT-NAME)"
    validations:
      required: false

  - type: textarea
    id: catalog_description
    attributes:
      label: Catalog description (required if creating a new catalog)
      description: "Only required when creating a new catalog."
      placeholder: "Describe what this catalog contains..."
    validations:
      required: false

  - type: input
    id: catalog_use_cases
    attributes:
      label: Allowed use cases for this catalog (required if creating a new catalog)
      description: "Comma-separated list. Example: overload, over_voltage, under_voltage"
      placeholder: "powerflow_analysis, fault_analysis, transient_stability_analysis "
    validations:
      required: false

  - type: markdown
    attributes:
      value: "## Dataset metadata"

  - type: input
    id: dataset_title
    attributes:
      label: Dataset title
      placeholder: "Overload simulation - GRID01"
    validations:
      required: true

  - type: textarea
    id: dataset_description
    attributes:
      label: Dataset description
      placeholder: "What is in the dataset, how it was produced, what it can be used for..."
    validations:
      required: true

  - type: input
    id: dataset_use_case
    attributes:
      label: Dataset use case
      description: "Must match one of the Allowed use cases defined in the target catalog."
      placeholder: "fault_analysis"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Geographical Location (high-level)
      placeholder: "Munich, Germany"
    validations:
      required: true

  - type: input
    id: concepts
    attributes:
      label: Concepts / tags (optional)
      description: "Comma-separated, e.g. overload, distribution-grid"
      placeholder: "overload, distribution-grid"
    validations:
      required: false

  - type: textarea
    id: distributions
    attributes:
      label: Distribution links (optional)
      description: "One per line (URLs or descriptors)."
      placeholder: "https://example.com/data.zip (format: zip)"
    validations:
      required: false
