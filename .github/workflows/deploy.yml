name: Build & Deploy Data Catalog

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: "recursive"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      #####################
      ## Python actions
      #####################
      - name: Setup Python 3.12.7
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.7"

      - name: Install uv 0.7.8
        run: curl -LsSf https://astral.sh/uv/0.7.8/install.sh | sh

      - name: uv lock
        run: uv lock

      - name: Install Python project dependencies
        run: uv sync --no-dev --no-install-project --locked

      - name: Patch generator to skip empty theme wordcloud
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          from pathlib import Path
          import re

          candidates = list(Path(".venv").glob("lib/python*/site-packages/simple_data_catalog_generator/analysis_functions.py"))
          if not candidates:
              candidates = list(Path(".venv").rglob("simple_data_catalog_generator/analysis_functions.py"))

          if not candidates:
              raise SystemExit("ERROR: simple_data_catalog_generator/analysis_functions.py not found under .venv")

          target = candidates[0]
          txt = target.read_text(encoding="utf-8")

          marker = "PATCH_EMPTY_WORDCLOUD_GUARD"

          # Remove any previous patch block
          txt = re.sub(
              r"(?m)^[ \t]*#\s*" + re.escape(marker) + r"\s*\n"
              r"^[ \t]*if\s+not\s+d\s*:\s*\n"
              r"^[ \t]*return\s*\n",
              "",
              txt,
          )

          needle = "wordcloud.generate_from_frequencies(frequencies=d)"
          pos = txt.find(needle)
          if pos == -1:
              raise SystemExit(f"ERROR: expected line not found in {target}: {needle}")

          line_start = txt.rfind("\n", 0, pos) + 1
          line_end = txt.find("\n", pos)
          if line_end == -1:
              line_end = len(txt)
          needle_line = txt[line_start:line_end]
          indent = re.match(r"^([ \t]*)", needle_line).group(1)

          insert = (
              f"{indent}# {marker}\n"
              f"{indent}if not d:\n"
              f"{indent}    return\n"
          )

          txt = txt[:line_start] + insert + txt[line_start:]
          target.write_text(txt, encoding="utf-8")
          print(f"OK: patched {target}")
          PY

      - name: Generate Data Catalog
        run: |
          chmod +x scripts/generate-datacatalog.sh
          ./scripts/generate-datacatalog.sh

      ####################
      ## Antora actions
      ####################
      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install Antora with the Antora Lunr Extension
        run: npm i antora @antora/lunr-extension @sntke/antora-mermaid-extension

      - name: Generate Site
        run: npx antora antora-playbook.yml

      - name: Generate fallback homepage
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import html
          import re

          docs = Path("docs")
          docs.mkdir(parents=True, exist_ok=True)

          # Find all generated HTML pages under docs, excluding index and UI assets
          pages = []
          for p in docs.rglob("*.html"):
              if p.name.lower() == "index.html":
                  continue
              parts = {part.lower() for part in p.parts}
              if "_" in parts:
                  continue
              pages.append(p)

          pages = sorted(pages)

          items = []
          for p in pages:
              rel = p.relative_to(docs).as_posix()

              # Default label from filename
              label = p.stem

              # Prefer the <title> text if present
              text = p.read_text(encoding="utf-8", errors="ignore")
              m = re.search(r"<title>(.*?)</title>", text, re.IGNORECASE | re.DOTALL)
              if m:
                  title = re.sub(r"\s+", " ", m.group(1)).strip()
                  if "::" in title:
                      title = title.split("::")[0].strip()
                  if title:
                      label = title

              items.append(f'<li><a href="{html.escape(rel)}">{html.escape(label)}</a></li>')

          if not items:
              items_html = "<li>No catalog pages were generated.</li>"
          else:
              items_html = "\n".join(items)

          index_html = f"""<!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <title>Data Catalog</title>
              <style>
                body {{
                  font-family: Arial, sans-serif;
                  margin: 2rem;
                  line-height: 1.5;
                }}
                h1 {{
                  margin-bottom: 0.5rem;
                }}
                ul {{
                  margin-top: 1rem;
                }}
                li {{
                  margin: 0.4rem 0;
                }}
              </style>
            </head>
            <body>
              <h1>Data Catalog</h1>
              <p>Available catalog pages:</p>
              <ul>
                {items_html}
              </ul>
            </body>
          </html>
          """

          (docs / "index.html").write_text(index_html, encoding="utf-8")
          print("OK: wrote docs/index.html")
          PY

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
