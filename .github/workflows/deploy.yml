name: Build & Deploy Data Catalog

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: "recursive"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      #####################
      ## Python actions
      #####################
      - name: Setup Python 3.12.7
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.7"

      - name: Install uv 0.7.8
        run: curl -LsSf https://astral.sh/uv/0.7.8/install.sh | sh

      - name: uv lock
        run: uv lock

      - name: Install Python project dependencies
        run: uv sync --no-dev --no-install-project --locked

      - name: Patch generator to skip empty theme wordcloud
        run: |
          set -euo pipefail

          # Use the same environment as the generator (uv/.venv)
          uv run python - <<'PY'
          from pathlib import Path
          import sys

          # Look directly inside the repo's uv venv first (most reliable)
          candidates = list(Path(".venv").glob("lib/python*/site-packages/simple_data_catalog_generator/analysis_functions.py"))

          # Fallback: if layout differs, search under .venv for the file
          if not candidates:
              candidates = list(Path(".venv").rglob("simple_data_catalog_generator/analysis_functions.py"))

          if not candidates:
              raise SystemExit("ERROR: simple_data_catalog_generator/analysis_functions.py not found under .venv")

          target = candidates[0]
          txt = target.read_text(encoding="utf-8")

          # Idempotent patch
          if "PATCH_EMPTY_WORDCLOUD_GUARD" in txt:
              print(f"OK: patch already present in {target}")
              sys.exit(0)

          needle = "wordcloud.generate_from_frequencies(frequencies=d)"
          if needle not in txt:
              raise SystemExit(f"ERROR: expected line not found in {target}: {needle}")

          patch = (
              "        # PATCH_EMPTY_WORDCLOUD_GUARD\n"
              "        if not d:\n"
              "            return\n"
          )

          txt = txt.replace(needle, patch + "        " + needle)
          target.write_text(txt, encoding="utf-8")
          print(f"OK: patched {target}")
          PY

      - name: Generate Data Catalog
        run: |
          chmod +x scripts/generate-datacatalog.sh
          ./scripts/generate-datacatalog.sh

      ####################
      ## Antora actions
      ####################
      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "18"

      - name: Install Antora with the Antora Lunr Extension
        run: npm i antora @antora/lunr-extension @sntke/antora-mermaid-extension

      - name: Generate Site
        run: npx antora antora-playbook.yml

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
