name: Issue Forms to Catalog YAML to PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  intake:
    if: |
      contains(github.event.issue.labels.*.name, 'catalog-create') ||
      contains(github.event.issue.labels.*.name, 'catalog-add-dataset') ||
      contains(github.event.issue.labels.*.name, 'catalog-edit-dataset') ||
      contains(github.event.issue.labels.*.name, 'catalog-remove-dataset')
    runs-on: ubuntu-latest

    steps:
      - name: Workflow sanity check
        run: echo "issue-to-pr.yml is loading correctly"

      - name: Comment on issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "Workflow sanity check passed. issue-to-pr.yml is being recognized by GitHub Actions."
            });
