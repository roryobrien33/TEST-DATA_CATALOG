policies:
  - uid: plcy:open-information
    title: Open Information Policy
    description: |
      Data classified as "Open Information" is intended to be freely available 
      and accessible to anyone without restrictions. This type of data generally 
      does not contain sensitive information and can be shared both within and 
      outside the organization.
      Complies with FAIR principles: Findable, Accessible, Interoperable, Reusable.
    permission:
      - uid: plcy:open-info-access
        description: |
          Allows any consumer to access the data without restriction.
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:open-register
        description: |
          The creator or owner must register the information in an indexed catalog 
          so consumers can find it.
        action: register
        assignee:
          - Data Provider
      - uid: plcy:open-license
        description: |
          The owner or creator must provide an open source or Creative Commons 
          license describing the conditions under which a consumer may use the information.
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:open-rights
        description: |
          The owner must provide a rights statement describing any IP or copyright 
          that the owner and/or anyone else holds over the information.
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:open-make-accessible
        description: |
          Providers must make the information available through an appropriate protocol.
        action: make_available
        assignee:
          - Data Provider

  - uid: plcy:internal-information
    title: Internal Information Policy
    description: |
      Data classified as "Internal Information" is intended for use only within 
      the project. While this data may not be considered highly sensitive, it is 
      still restricted to employees or authorized personnel.
    permission:
      - uid: plcy:internal-access
        description: |
          Allows project members to access the data. Consumers outside the project 
          do not have access unless agreed upon by the owner.
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:internal-store
        description: |
          Creators must save their information in the appropriate folders in the 
          file sharing infrastructure available to the project.
        action: store
        assignee:
          - Data Provider
      - uid: plcy:internal-agreement
        description: |
          If the owner decides to share information with non-project members, 
          appropriate arrangements must be made with the provider.
        action: share
        assignee:
          - Data Provider

  - uid: plcy:restricted-information
    title: Restricted Information Policy
    description: |
      Data classified as "Restricted Information" contains information that requires 
      a higher level of protection due to its sensitivity. Access to this data is 
      limited to specific individuals or groups based on their role within the project.
      Unlike internal information, restricted information is meant for sharing with 
      those that have received explicit permission.
    permission:
      - uid: plcy:restricted-access
        description: |
          Only consumers with whom the owner has a data sharing agreement have access.
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:restricted-agreement
        description: |
          The owner must provide a data sharing agreement stating addressing rights, 
          licensing, and use limitations. Any consumer wishing access must agree 
          to this agreement.
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:restricted-environment
        description: |
          The provider must provide an access-controlled environment for restricted data.
        action: provide
        assignee:
          - Service Provider

  - uid: plcy:personal-information
    title: Personal Information Policy
    description: |
      Data classified as "Personal Information" falls under the GDPR. This includes 
      any data that can be used to identify, contact, or locate a single person.
      Access must be granted in compliance with GDPR and limited to those consumers 
      that fall under the conditions laid out in GDPR Article 6.
    permission:
      - uid: plcy:personal-access
        description: |
          Access is granted only to consumers/users that comply with GDPR conditions.
        action: access
        assignee:
          - Data Consumer
    obligation:
      - uid: plcy:personal-minimize
        description: |
          Collection of personal data must be minimized. All personal data must be 
          deleted before the termination of the project.
        action: delete
        assignee:
          - Data Provider
      - uid: plcy:personal-subject-rights
        description: |
          The provider must allow subjects of Personal Information to claim their 
          GDPR rights: Right of access, Right to rectification, Right to erasure.
        action: allow
        assignee:
          - Service Provider
      - uid: plcy:personal-purpose
        description: |
          The owner and creator must clearly state the purpose limitation with which 
          the information was collected. Personal Information may only be shared if 
          the subject has given permission.
        action: provide
        assignee:
          - Data Provider

  - uid: plcy:ai-reporting
    title: AI for Reporting Policy
    description: |
      Applies when AI is used for reporting or dissemination activities (text, images, 
      video or other media). Here, AI is not used for primary research activities, 
      just for reporting on them.
    obligation:
      - uid: plcy:ai-reporting-attribution
        description: |
          If the artifact was entirely created using AI, attribution must state: 
          "This [material/visual/text/...] was (in part) generated using AI. 
          It was generated using [model name]+[model version] at [date]".
        action: provide
        assignee:
          - Data Provider

  - uid: plcy:ai-using
    title: Using AI Policy
    description: |
      Applies when AI is used for creating research artifacts or generating data. 
      In this case, AI has been used during the research itself.
    obligation:
      - uid: plcy:ai-using-provenance
        description: |
          Must provide provenance conforming to the prov-o standard, including:
          - The Activity (the run of the AI system) that produced the dataset, 
            including when the Activity took place
          - The AI system, including its version
          - The input data(sets), including any prompts or configurations 
            like 'temperature' that the AI system used to produce the result.
        action: provide
        assignee:
          - Data Provider

  - uid: plcy:ai-creating
    title: Creating AI Policy
    description: |
      Applies when the research focuses on creating an AI system as defined by the 
      EU AI Act. The trained AI model needs to be published with corresponding metadata.
      In case of conflicts with other classifications, the most stringent applies.
    obligation:
      - uid: plcy:ai-creating-training-data
        description: |
          Must publish the training dataset used to develop the AI system.
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:ai-creating-validation-data
        description: |
          Must publish the validation dataset used for testing the validity of the model.
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:ai-creating-prompt-logs
        description: |
          Must publish prompt-response logs that register the models inputs and outputs.
        action: provide
        assignee:
          - Data Provider
      - uid: plcy:ai-creating-documentation
        description: |
          Must publish architectural documentation addressing:
          - Written strategy for regulatory compliance and conformity assessment
          - Procedures used in the development of the AI system and procedures 
